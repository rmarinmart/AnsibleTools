---
# Playbook para instalar MongoDB Community Edition de forma desatendida,
# eligiendo automáticamente la versión compatible según el soporte de AVX
# (Advanced Vector Extensions) del CPU destino.
#
# CONTEXTO:
# Desde MongoDB 5.0, el binario mongod requiere que el CPU soporte AVX.
# Algunos procesadores (p.ej. Intel Pentium/Celeron de gama baja, incluso
# generaciones recientes como Skylake G4400) NO tienen AVX, e Intel lo
# desactiva deliberadamente para diferenciar la gama Core de la Pentium/
# Celeron. En esos equipos, mongod --version falla con:
#   "Instrucción ilegal (`core' generado)"
# La única solución es usar la última serie sin ese requisito: MongoDB 4.4.
#
# Este playbook detecta el flag "avx" en /proc/cpuinfo del host remoto y
# decide en tiempo de ejecución:
#   - Si HAY avx  -> instala MongoDB 7.0 (repo "jammy", ver nota original)
#   - Si NO HAY avx -> instala MongoDB 4.4 fijado por versión (repo "focal",
#     que es la última serie que publicó paquetes oficiales para esta rama)
#     y lo bloquea (hold) para que apt no lo actualice a una versión
#     incompatible con el hardware.
#
# Referencias:
#   https://www.mongodb.com/es/docs/v7.0/tutorial/install-mongodb-on-ubuntu/
#   https://www.mongodb.com/es/docs/v7.0/reference/installation-ubuntu-community-troubleshooting/
#
# Uso:
#   ansible-playbook install_mongodb.yml -i inventario

- name: Instalar MongoDB Community Edition (versión según soporte de AVX)
  hosts: all:!localhost
  become: true
  vars:
    mongodb_modern_version: "7.0"
    mongodb_modern_suite: jammy   # no existe suite "noble" en el repo de Mongo
    mongodb_legacy_version: "4.4"
    mongodb_legacy_full_version: "4.4.29"
    mongodb_legacy_suite: focal   # última suite con paquetes oficiales de 4.4

  tasks:
    # -------------------------------------------------------------------
    # 1. Detección de soporte AVX en el host destino
    # -------------------------------------------------------------------
    - name: Comprobar si el CPU soporta AVX
      shell: "grep -qm1 avx /proc/cpuinfo"
      register: avx_check
      changed_when: false
      failed_when: false

    - name: Fijar variable de soporte AVX
      set_fact:
        mongodb_avx_supported: "{{ avx_check.rc == 0 }}"

    - name: Fijar variables derivadas según soporte AVX
      set_fact:
        mongodb_keyring_path: "/usr/share/keyrings/mongodb-server-{{ mongodb_modern_version if mongodb_avx_supported else mongodb_legacy_version }}.gpg"
        mongodb_sources_path: "/etc/apt/sources.list.d/mongodb-org-{{ mongodb_modern_version if mongodb_avx_supported else mongodb_legacy_version }}.list"
        mongodb_gpg_url: "https://www.mongodb.org/static/pgp/server-{{ mongodb_modern_version if mongodb_avx_supported else mongodb_legacy_version }}.asc"
        mongodb_suite: "{{ mongodb_modern_suite if mongodb_avx_supported else mongodb_legacy_suite }}"
        mongodb_pkg_version: "{{ mongodb_modern_version if mongodb_avx_supported else mongodb_legacy_version }}"

    - name: Mostrar decisión de versión
      debug:
        msg: >-
          CPU {{ 'SÍ' if mongodb_avx_supported else 'NO' }} soporta AVX.
          Se instalará MongoDB {{ mongodb_modern_version if mongodb_avx_supported else mongodb_legacy_full_version }}
          desde el repositorio "{{ mongodb_suite }}".

    # -------------------------------------------------------------------
    # 2. Dependencias comunes
    # -------------------------------------------------------------------
    - name: Actualizar caché de apt
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Instalar dependencias (gnupg, curl)
      apt:
        name:
          - gnupg
          - curl
        state: present

    # -------------------------------------------------------------------
    # 3. Repositorio y clave GPG de MongoDB (versión ya decidida)
    # -------------------------------------------------------------------
    - name: Comprobar si la clave GPG de MongoDB ya está instalada
      stat:
        path: "{{ mongodb_keyring_path }}"
      register: mongodb_keyring_stat

    - name: Descargar y convertir la clave GPG de MongoDB a formato binario
      # Se usa curl en vez del módulo get_url por el bug conocido de ansible-core
      # en Python 3.12+ (HTTPSConnection.__init__() got an unexpected keyword
      # argument 'cert_file').
      shell: "curl -fsSL {{ mongodb_gpg_url }} | gpg -o {{ mongodb_keyring_path }} --dearmor"
      args:
        executable: /bin/bash
      when: not mongodb_keyring_stat.stat.exists

    - name: Asegurar permisos de lectura para todos en la clave GPG
      file:
        path: "{{ mongodb_keyring_path }}"
        mode: "0644"

    - name: Añadir el repositorio de MongoDB
      copy:
        dest: "{{ mongodb_sources_path }}"
        mode: "0644"
        content: "deb [ arch=amd64,arm64 signed-by={{ mongodb_keyring_path }} ] https://repo.mongodb.org/apt/ubuntu {{ mongodb_suite }}/mongodb-org/{{ mongodb_pkg_version }} multiverse\n"
      register: mongodb_repo

    - name: Actualizar caché de apt tras añadir el repositorio
      apt:
        update_cache: true
      when: mongodb_repo.changed

    # -------------------------------------------------------------------
    # 4a. Instalación MODERNA (con AVX) — MongoDB 7.0
    # -------------------------------------------------------------------
    - name: "[AVX] Instalar MongoDB Community Server"
      apt:
        name: mongodb-org
        state: present
      when: mongodb_avx_supported

    # -------------------------------------------------------------------
    # 4b. Instalación LEGACY (sin AVX) — MongoDB 4.4
    # -------------------------------------------------------------------
    - name: "[sin AVX] Comprobar si libssl1.1 está instalado"
      command: dpkg -s libssl1.1
      register: libssl_check
      changed_when: false
      failed_when: false
      when: not mongodb_avx_supported

    - name: "[sin AVX] Instalar libssl1.1 (dependencia de MongoDB 4.4 ausente en Ubuntu 22.04+)"
      # MongoDB 4.4 está compilado contra OpenSSL 1.1, que ya no viene en los
      # repos de Ubuntu 22.04/24.04. Ajusta la URL/versión si tu arquitectura
      # no es amd64 o si el paquete deja de estar disponible en ese path;
      # consulta https://launchpad.net/ubuntu/+source/openssl para la última
      # build disponible en el repo de seguridad de Ubuntu.
      apt:
        deb: http://security.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
      when:
        - not mongodb_avx_supported
        - libssl_check.rc != 0

    - name: "[sin AVX] Instalar MongoDB 4.4 con versión fijada"
      apt:
        name:
          - "mongodb-org={{ mongodb_legacy_full_version }}"
          - "mongodb-org-server={{ mongodb_legacy_full_version }}"
          - "mongodb-org-shell={{ mongodb_legacy_full_version }}"
          - "mongodb-org-mongos={{ mongodb_legacy_full_version }}"
          - "mongodb-org-tools={{ mongodb_legacy_full_version }}"
        state: present
        allow_downgrade: true
      when: not mongodb_avx_supported

    - name: "[sin AVX] Bloquear versión de los paquetes (evitar upgrade a versión incompatible)"
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - mongodb-org
        - mongodb-org-server
        - mongodb-org-shell
        - mongodb-org-mongos
        - mongodb-org-tools
      when: not mongodb_avx_supported

    # -------------------------------------------------------------------
    # 5. Servicio y verificación (común a ambas ramas)
    # -------------------------------------------------------------------
    - name: Asegurar que el servicio mongod esté activo y habilitado
      service:
        name: mongod
        state: started
        enabled: true

    - name: Verificar versión de MongoDB instalada
      command: mongod --version
      register: mongodb_version_output
      changed_when: false

    - name: Mostrar versión de MongoDB
      debug:
        msg: "{{ mongodb_version_output.stdout_lines[0] }}"