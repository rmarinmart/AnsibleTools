---
# Playbook para instalar KeepassXC desde el PPA oficial de forma desatendida
#
# Uso:
#   ansible-playbook install_keepassxc.yml -i inventario

- name: Instalar KeepassXC desde PPA
  hosts: all
  become: true
  vars:
    keepassxc_ppa: "ppa:phoerious/keepassxc"

  tasks:
    - name: Asegurar herramientas para gestionar PPAs (add-apt-repository)
      apt:
        name: software-properties-common
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Comprobar si el PPA de KeepassXC ya está añadido
      shell: "grep -rhE '^deb .*phoerious/keepassxc' /etc/apt/sources.list /etc/apt/sources.list.d/ 2>/dev/null"
      register: keepassxc_ppa_check
      changed_when: false
      failed_when: false

    - name: Añadir el PPA de KeepassXC
      # Se usa add-apt-repository directamente en vez del módulo apt_repository
      # por el mismo bug conocido de ansible-core en Python 3.12+ (ver tareas de
      # Docker): apt_repository consulta la API de Launchpad usando las librerías
      # HTTP de Ansible, que fallan con "cert_file". add-apt-repository resuelve
      # el PPA con sus propias herramientas del sistema, sin ese problema.
      command: "add-apt-repository -y {{ keepassxc_ppa }}"
      when: keepassxc_ppa_check.rc != 0
      register: keepassxc_ppa_added

    - name: Actualizar caché de apt tras añadir el PPA
      apt:
        update_cache: true
      when: keepassxc_ppa_added.changed

    - name: Instalar KeepassXC
      apt:
        name: keepassxc
        state: present

    - name: Verificar versión de KeepassXC instalada
      # No se ejecuta el binario "keepassxc --version" porque es una app gráfica
      # (Qt) y falla sin un display X11 disponible en la sesión SSH.
      # Se consulta el paquete instalado directamente en su lugar.
      command: "dpkg-query -W -f='${Version}' keepassxc"
      register: keepassxc_version_output
      changed_when: false

    - name: Mostrar versión de KeepassXC
      debug:
        msg: "KeepassXC {{ keepassxc_version_output.stdout }} instalado correctamente"