---
- name: Configurar proxy de apt en Linux Mint (tolerante a nombres legacy)
  hosts: all
  become: true

  vars:
    proxy_content: |
      Acquire::http::Proxy "http://172.30.12.178:3142";
    proxy_canonical: /etc/apt/apt.conf.d/01proxy
    proxy_legacy: /etc/apt/apt.conf.d/02proxy

  tasks:
    - name: Comprobar si existe el fichero legacy 02proxy
      ansible.builtin.stat:
        path: "{{ proxy_legacy }}"
      register: legacy_stat

    - name: Eliminar 02proxy si existe
      ansible.builtin.file:
        path: "{{ proxy_legacy }}"
        state: absent
      when: legacy_stat.stat.exists

    - name: Comprobar si existe el fichero canónico 01proxy
      ansible.builtin.stat:
        path: "{{ proxy_canonical }}"
      register: canonical_stat

    - name: Leer el contenido de 01proxy (si existe)
      ansible.builtin.slurp:
        path: "{{ proxy_canonical }}"
      register: proxy_slurp
      when: canonical_stat.stat.exists

    - name: Determinar si el contenido de 01proxy es correcto
      ansible.builtin.set_fact:
        proxy_content_ok: "{{ (proxy_slurp.content | b64decode | trim) == (proxy_content | trim) }}"
      when: canonical_stat.stat.exists

    - name: Crear o corregir 01proxy si no existe o el contenido no es correcto
      ansible.builtin.copy:
        dest: "{{ proxy_canonical }}"
        content: "{{ proxy_content }}"
        owner: root
        group: root
        mode: "0644"
      when: not canonical_stat.stat.exists or not proxy_content_ok