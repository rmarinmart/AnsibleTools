---
# Playbook para instalar VirtualBox de forma desatendida
#
# Uso:
#   ansible-playbook install_virtualbox.yml -i inventario

- name: Instalar VirtualBox
  hosts: all:!localhost
  become: true
  vars:
    virtualbox_keyring_path: /usr/share/keyrings/oracle-virtualbox-2016.gpg
    virtualbox_sources_path: /etc/apt/sources.list.d/virtualbox.list
    virtualbox_package: virtualbox-7.2
    # Fichero local (en el nodo de control) donde se listan los equipos que
    # necesitan enrolar manualmente la clave MOK para poder cargar vboxdrv.
    virtualbox_secureboot_report_path: "./informe_secureboot_pendiente.txt"

  tasks:
    - name: Reiniciar el informe de equipos pendientes de Secure Boot
      copy:
        dest: "{{ virtualbox_secureboot_report_path }}"
        content: ""
        force: true
      delegate_to: localhost
      run_once: true

    - name: Actualizar caché de apt
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Instalar dependencias (ca-certificates, curl, gnupg, mokutil)
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - mokutil # Necesario para comprobar el estado de Secure Boot
        state: present

    - name: Comprobar si la clave GPG de Oracle VirtualBox ya está instalada
      stat:
        path: "{{ virtualbox_keyring_path }}"
      register: virtualbox_keyring_stat

    - name: Descargar y convertir la clave GPG de Oracle VirtualBox a formato binario
      # Se usa curl en vez del módulo get_url por el bug conocido de ansible-core
      # en Python 3.12+ (HTTPSConnection.__init__() got an unexpected keyword
      # argument 'cert_file'), visto ya en Docker/Sublime Text/KeepassXC.
      # Requiere shell (no command) por el pipe entre curl y gpg.
      shell: "curl -fsSL https://www.virtualbox.org/download/oracle_vbox_2016.asc | gpg --yes --output {{ virtualbox_keyring_path }} --dearmor"
      args:
        executable: /bin/bash
      when: not virtualbox_keyring_stat.stat.exists

    - name: Asegurar permisos de lectura para todos en la clave GPG
      file:
        path: "{{ virtualbox_keyring_path }}"
        mode: "0644"

    - name: Obtener la arquitectura de dpkg
      command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Obtener el codename de Ubuntu subyacente (compatible con derivadas como Linux Mint)
      # Misma lógica aplicada en Docker: usa UBUNTU_CODENAME si existe (en Mint
      # apunta al Ubuntu base, p.ej. "noble"), y si no, VERSION_CODENAME.
      # No se usa ansible_distribution_release porque en derivadas devuelve el
      # codename propio (p.ej. "zena" en Mint), inexistente en el repo de VirtualBox.
      shell: . /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"
      args:
        executable: /bin/bash
      register: virtualbox_apt_codename
      changed_when: false

    - name: Añadir el repositorio de VirtualBox
      copy:
        dest: "{{ virtualbox_sources_path }}"
        mode: "0644"
        content: "deb [arch={{ dpkg_arch.stdout }} signed-by={{ virtualbox_keyring_path }}] https://download.virtualbox.org/virtualbox/debian {{ virtualbox_apt_codename.stdout }} contrib\n"
      register: virtualbox_repo

    - name: Actualizar caché de apt tras añadir el repositorio
      apt:
        update_cache: true
      when: virtualbox_repo.changed

    - name: Instalar VirtualBox
      apt:
        name: "{{ virtualbox_package }}"
        state: present

    - name: Verificar versión de VirtualBox instalada
      # VBoxManage es una herramienta de línea de comandos, no requiere display,
      # así que a diferencia de KeepassXC/Sublime Text sí es seguro ejecutarla.
      command: VBoxManage --version
      register: virtualbox_version_output
      changed_when: false

    - name: Mostrar versión de VirtualBox
      debug:
        msg: "VirtualBox {{ virtualbox_version_output.stdout }} instalado correctamente"

    - name: Instalar cabeceras del kernel en ejecución (necesarias para DKMS)
      apt:
        name: "linux-headers-{{ ansible_kernel }}"
        state: present

    - name: Comprobar si el servicio vboxdrv está activo
      command: systemctl is-active vboxdrv
      register: virtualbox_drv_status
      changed_when: false
      failed_when: false

    - name: Comprobar el estado de Secure Boot (mokutil)
      # Se comprueba ANTES de intentar vboxconfig: si Secure Boot está activo
      # y vboxdrv no ha cargado, ya sabemos que vboxconfig va a intentar
      # generar y enrolar una clave MOK, lo cual exige una contraseña
      # interactiva (mokutil --import lee de /dev/tty, ignora stdin) y se
      # queda colgado en un playbook desatendido. Mejor no lanzarlo siquiera.
      command: mokutil --sb-state
      register: virtualbox_secureboot_check
      changed_when: false
      failed_when: false
      when: virtualbox_drv_status.stdout != 'active'

    - name: Determinar si Secure Boot está activo
      set_fact:
        virtualbox_secureboot_enabled: >-
          {{ virtualbox_drv_status.stdout != 'active'
             and 'SecureBoot enabled' in (virtualbox_secureboot_check.stdout | default('')) }}

    - name: Reconfigurar el módulo de VirtualBox (vboxconfig) si vboxdrv no está activo y Secure Boot está desactivado
      # Cubre el caso típico de Secure Boot desactivado pero DKMS no compiló
      # bien en la instalación (p.ej. porque faltaban las cabeceras del kernel,
      # ya solucionado en la tarea anterior). No se lanza si Secure Boot está
      # activo (ver comprobación anterior): en ese caso el problema es de
      # firma/enrolado y requiere intervención manual, así que evitamos el
      # riesgo de que se quede colgado esperando una contraseña que nunca
      # llegará. El timeout se mantiene como red de seguridad adicional por
      # si la compilación de DKMS se alarga o se atasca por otro motivo.
      command: timeout 60 /sbin/vboxconfig
      register: virtualbox_vboxconfig_result
      changed_when: "'done.' in virtualbox_vboxconfig_result.stdout"
      failed_when: false
      when:
        - virtualbox_drv_status.stdout != 'active'
        - not virtualbox_secureboot_enabled

    - name: "AVISO: vboxconfig se agotó por timeout"
      debug:
        msg: >
          vboxconfig no terminó en 60s a pesar de que Secure Boot está
          desactivado. Puede tratarse de una compilación DKMS especialmente
          lenta o de un problema distinto; revisa manualmente con
          'sudo dkms status' y 'cat /var/log/vbox-install.log' en este equipo.
      when: >
        virtualbox_drv_status.stdout != 'active'
        and not virtualbox_secureboot_enabled
        and virtualbox_vboxconfig_result.rc is defined
        and virtualbox_vboxconfig_result.rc == 124

    - name: Volver a comprobar el servicio vboxdrv tras vboxconfig
      command: systemctl is-active vboxdrv
      register: virtualbox_drv_status_retry
      changed_when: false
      failed_when: false
      when:
        - virtualbox_drv_status.stdout != 'active'
        - not virtualbox_secureboot_enabled

    - name: Consolidar el estado final de vboxdrv
      set_fact:
        virtualbox_drv_active: >-
          {{ virtualbox_drv_status.stdout == 'active'
             or (virtualbox_drv_status_retry.stdout | default('')) == 'active' }}

    - name: Determinar si el equipo necesita enrolado manual de la clave MOK
      set_fact:
        virtualbox_needs_mok_enrollment: >-
          {{ not virtualbox_drv_active and virtualbox_secureboot_enabled }}
        virtualbox_needs_investigation: >-
          {{ not virtualbox_drv_active and not virtualbox_secureboot_enabled }}

    - name: "AVISO: este equipo requiere firmar/enrolar la clave MOK manualmente"
      debug:
        msg: >
          Secure Boot está activo y el módulo vboxdrv no ha podido cargarse
          (sin firmar). Habrá que ejecutar 'sudo /sbin/vboxconfig' y, en el
          siguiente arranque, aprobar el enrolado de la clave MOK desde el
          menú azul (MOK Manager) tecleando la contraseña que se establezca.
          Alternativa: desactivar Secure Boot en la BIOS de este equipo si es
          posible.
      when: virtualbox_needs_mok_enrollment

    - name: "AVISO: vboxdrv no carga por un motivo distinto a Secure Boot"
      debug:
        msg: >
          Secure Boot no está activo, pero vboxdrv sigue sin cargar tras
          'vboxconfig'. Revisa manualmente con 'sudo dkms status' y
          'dmesg | grep -i vbox' en este equipo; puede tratarse de un
          problema de compilación no relacionado con la firma del módulo.
      when: virtualbox_needs_investigation

    - name: Añadir este equipo al informe de pendientes de Secure Boot
      lineinfile:
        path: "{{ virtualbox_secureboot_report_path }}"
        line: "{{ inventory_hostname }} ({{ ansible_default_ipv4.address | default('sin IP detectada') }}) - Secure Boot activo, pendiente de enrolado MOK"
        create: true
      delegate_to: localhost
      when: virtualbox_needs_mok_enrollment

    - name: Añadir este equipo al informe como pendiente de revisión manual
      lineinfile:
        path: "{{ virtualbox_secureboot_report_path }}"
        line: "{{ inventory_hostname }} ({{ ansible_default_ipv4.address | default('sin IP detectada') }}) - vboxdrv no carga, NO es Secure Boot, revisar manualmente"
        create: true
      delegate_to: localhost
      when: virtualbox_needs_investigation

    - name: Fallar la tarea si vboxdrv no está activo tras todos los intentos
      # No detiene el resto del playbook en otros hosts (estrategia linear por
      # defecto de Ansible), pero deja constancia clara en la salida de
      # ansible de qué equipo necesita intervención.
      fail:
        msg: >
          vboxdrv no está activo en {{ inventory_hostname }}.
          Revisa {{ virtualbox_secureboot_report_path }} para el listado
          completo de equipos pendientes tras esta ejecución.
      when: not virtualbox_drv_active

- name: Mostrar resumen final de equipos pendientes de Secure Boot
  hosts: localhost
  gather_facts: false
  vars:
    virtualbox_secureboot_report_path: "./informe_secureboot_pendiente.txt"
  tasks:
    - name: Leer el informe generado
      slurp:
        src: "{{ virtualbox_secureboot_report_path }}"
      register: virtualbox_report_raw
      failed_when: false

    - name: Mostrar el resumen
      debug:
        msg: >-
          {{ (virtualbox_report_raw.content | b64decode).splitlines()
             if virtualbox_report_raw.content is defined and
                (virtualbox_report_raw.content | b64decode | trim) != ''
             else 'Ningún equipo pendiente de enrolado manual de Secure Boot.' }}