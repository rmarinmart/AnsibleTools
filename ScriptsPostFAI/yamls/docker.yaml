---
# Playbook para instalar Docker CE en Ubuntu de forma desatendida
# (traducción del script oficial de instalación vía apt)
#
# Uso:
#   ansible-playbook install_docker.yml -i inventario

- name: Instalar Docker CE
  hosts: all:!localhost
  become: true
  vars:
    docker_keyring_path: /etc/apt/keyrings/docker.asc
    docker_sources_path: /etc/apt/sources.list.d/docker.sources
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

  tasks:
    - name: Actualizar caché de apt
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Instalar dependencias (ca-certificates, curl)
      apt:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Crear directorio /etc/apt/keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Descargar la clave GPG oficial de Docker
      # Se usa curl en vez del módulo get_url por un bug conocido de ansible-core
      # en Python 3.12+ (HTTPSConnection.__init__() got an unexpected keyword
      # argument 'cert_file'). Si actualizas ansible-core a >=2.16.3 puedes
      # volver a usar el módulo get_url si lo prefieres.
      command: "curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o {{ docker_keyring_path }}"
      args:
        creates: "{{ docker_keyring_path }}"

    - name: Asegurar permisos de lectura para todos en la clave GPG
      file:
        path: "{{ docker_keyring_path }}"
        mode: "0644"

    - name: Obtener la arquitectura de dpkg
      command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Obtener el codename de Ubuntu subyacente (compatible con derivadas como Linux Mint)
      # Replica la lógica del script original: usa UBUNTU_CODENAME si existe
      # (p.ej. en Mint apunta al Ubuntu base, "noble"), y si no, VERSION_CODENAME.
      # No se puede usar directamente el hecho ansible_distribution_release porque
      # en distribuciones derivadas devuelve el codename propio (p.ej. "zena" en Mint),
      # que no existe en el repositorio de Docker.
      shell: . /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"
      args:
        executable: /bin/bash
      register: docker_apt_codename
      changed_when: false

    - name: Añadir el repositorio de Docker (formato deb822)
      copy:
        dest: "{{ docker_sources_path }}"
        mode: "0644"
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ docker_apt_codename.stdout }}
          Components: stable
          Architectures: {{ dpkg_arch.stdout }}
          Signed-By: {{ docker_keyring_path }}
      register: docker_repo

    - name: Actualizar caché de apt tras añadir el repositorio
      apt:
        update_cache: true
      when: docker_repo.changed

    - name: Instalar Docker CE y plugins
      apt:
        name: "{{ docker_packages }}"
        state: present

    - name: Asegurar que el servicio Docker esté activo y habilitado
      service:
        name: docker
        state: started
        enabled: true

    - name: Verificar versión de Docker instalada
      command: docker --version
      register: docker_version_output
      changed_when: false

    - name: Mostrar versión de Docker
      debug:
        msg: "{{ docker_version_output.stdout }}"