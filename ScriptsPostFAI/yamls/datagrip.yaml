- name: Instalar DataGrip mediante Snap
  hosts: all:!localhost
  become: yes

  tasks:
    - name: Eliminar el bloqueo de snap en Linux Mint (nosnap.pref)
      file:
        path: /etc/apt/preferences.d/nosnap.pref
        state: absent

    - name: Actualizar caché de apt
      apt:
        update_cache: yes

    - name: Instalar dependencias (snapd)
      apt:
        name:
          - snapd
        state: present

    - name: Activar y arrancar el servicio snapd.socket
      systemd:
        name: snapd.socket
        enabled: yes
        state: started

    - name: Esperar a que el socket de snapd esté disponible
      wait_for:
        path: /run/snapd.socket
        state: present
        timeout: 10

    - name: Crear enlace simbólico classic (snap -> /var/lib/snapd/snap) si no existe
      file:
        src: /var/lib/snapd/snap
        dest: /snap
        state: link
        force: no
      ignore_errors: yes

    - name: Instalar JetBrains DataGrip con confinamiento clásico
      community.general.snap:
        name: datagrip
        state: present
        classic: true